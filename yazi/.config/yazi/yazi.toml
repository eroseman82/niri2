# -------------------------
# MANAGER
# -------------------------

[manager]
ratio = [1, 3, 4]
show_hidden = true

# -------------------------
# OPENERS
# -------------------------

[opener]

edit = [
    { run = 'nvim "$@"', block = true, desc = "Neovim" },
]

open = [
    { run = 'xdg-open "$@"', orphan = true, desc = "Open externally" },
]

# -------------------------
# OPEN RULES
# first match wins
# -------------------------

[open]
rules = [

    # ---------------------
    # TEXT / CODE
    # ---------------------

    { mime = "text/*", use = "edit" },
    { mime = "application/json", use = "edit" },

    { name = "*.toml", use = "edit" },
    { name = "*.lua", use = "edit" },
    { name = "*.yaml", use = "edit" },
    { name = "*.yml", use = "edit" },
    { name = "*.conf", use = "edit" },
    { name = "*.rs", use = "edit" },
    { name = "*.py", use = "edit" },
    { name = "*.js", use = "edit" },
    { name = "*.ts", use = "edit" },

    # ---------------------
    # MEDIA
    # ---------------------

    { mime = "video/*", use = "open" },
    { mime = "audio/*", use = "open" },
    { mime = "image/*", use = "open" },

    # ---------------------
    # DOCUMENTS
    # ---------------------

    { mime = "application/pdf", use = "open" },

    # ---------------------
    # ARCHIVES
    # ---------------------

    { mime = "application/zip", use = "open" },
    { mime = "application/x-tar", use = "open" },
    { mime = "application/x-7z-compressed", use = "open" },

    # ---------------------
    # FALLBACK
    # ---------------------

    { name = "*", use = "open" },
]

# -------------------------
# PREVIEW SETTINGS
# -------------------------

[preview]
image_cache_size = 10485760
image_filter = "lanczos3"
preview_protocol = "kitty"

# -------------------------
# PREVIEW PLUGINS
# Only override formats Yazi can't preview natively
# -------------------------

[plugin]
prepend_previewers = [

    # images
    { mime = "image/*", run = "image" },

    # video thumbnails
    { name = "*.mp4", run = "video" },
    { name = "*.mkv", run = "video" },
    { name = "*.avi", run = "video" },
    { name = "*.mov", run = "video" },

    # pdf rendering
    { mime = "application/pdf", run = "pdf" },
]

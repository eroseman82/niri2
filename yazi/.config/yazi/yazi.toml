# -------------------------
# MANAGER
# -------------------------
[manager]
ratio       = [1, 3, 4]
show_hidden = true

# -------------------------
# OPENERS
# -------------------------
[opener]
edit = [
    { run = 'nvim $@', block = true, desc = "Neovim" },
]
open = [
    { run = 'xdg-open $@', orphan = true, desc = "Open externally" },
]

# -------------------------
# OPEN RULES
# name = rules first (extension-based, always reliable)
# mime = rules as fallback (content-based, can misfire on empty/new files)
# first match wins
# -------------------------
[open]
rules = [
    # ---------------------
    # TEXT / CODE
    # ---------------------
    { name = "*.md",         use = "edit" },
    { name = "*.kdl",        use = "edit" },
    { name = "*.toml",       use = "edit" },
    { name = "*.yaml",       use = "edit" },
    { name = "*.yml",        use = "edit" },
    { name = "*.conf",       use = "edit" },
    { name = "*.ini",        use = "edit" },
    { name = "*.json",       use = "edit" },
    { name = "*.lua",        use = "edit" },
    { name = "*.rs",         use = "edit" },
    { name = "*.py",         use = "edit" },
    { name = "*.js",         use = "edit" },
    { name = "*.ts",         use = "edit" },
    { name = "*.sh",         use = "edit" },
    { name = "*.bash",       use = "edit" },
    { name = "*.zsh",        use = "edit" },
    { name = "*.fish",       use = "edit" },
    { name = "*.env",        use = "edit" },
    { name = "*.gitignore",  use = "edit" },
    { name = "*.gitconfig",  use = "edit" },
    { name = "*.lock",       use = "edit" },
    # mime catch-all for text the name rules didn't catch
    { mime = "text/*",              use = "edit" },
    { mime = "application/json",    use = "edit" },
    # ---------------------
    # MEDIA
    # ---------------------
    { mime = "image/*",  use = "open" },
    { mime = "video/*",  use = "open" },
    { mime = "audio/*",  use = "open" },
    # ---------------------
    # DOCUMENTS & ARCHIVES
    # ---------------------
    { mime = "application/pdf",              use = "open" },
    { mime = "application/zip",              use = "open" },
    { mime = "application/x-tar",            use = "open" },
    { mime = "application/x-7z-compressed",  use = "open" },
    # ---------------------
    # FALLBACK
    # ---------------------
    { name = "*", use = "open" },
]

# -------------------------
# PREVIEW
# -------------------------
[preview]
image_cache_size = 10485760
image_filter     = "lanczos3"
preview_protocol = "kitty"

# -------------------------
# PLUGINS
# -------------------------
[plugin]
prepend_previewers = [
    { mime = "image/*",             run = "image" },
    { mime = "application/pdf",     run = "pdf"   },
    { name = "*.mp4",  run = "video" },
    { name = "*.mkv",  run = "video" },
    { name = "*.avi",  run = "video" },
    { name = "*.mov",  run = "video" },
]
